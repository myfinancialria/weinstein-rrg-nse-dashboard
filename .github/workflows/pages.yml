name: Publish dashboard

on:
  push:
    branches: [main]
  schedule:
    # 9:00 PM IST, Monday to Friday. Market holidays are skipped by the data
    # provider returning unchanged/empty data; the dashboard still publishes.
    - cron: "30 15 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  refresh-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refresh dashboard data and market blog
        env:
          GIFT_NIFTY_LEVEL: ${{ secrets.GIFT_NIFTY_LEVEL }}
          GIFT_NIFTY_SYMBOL: ${{ secrets.GIFT_NIFTY_SYMBOL }}
        run: |
          python build_dashboard_data.py
          python generate_market_blog.py

      - name: Commit refreshed dashboard data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update daily dashboard data"
          file_pattern: dashboard/*.json reports/*.json

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload dashboard artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
